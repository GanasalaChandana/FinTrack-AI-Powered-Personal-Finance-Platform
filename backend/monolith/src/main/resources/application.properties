# =====================
# Server
# =====================
server.port=8080
spring.application.name=fintrack-monolith

# =====================
# Database (use env vars on Render)
# =====================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =====================
# Flyway
# =====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# =====================
# JWT
# =====================
jwt.secret=${JWT_SECRET:default-secret-change-in-production}
jwt.expiration=86400000

# =====================
# Google OAuth
# =====================
google.client.id=${GOOGLE_CLIENT_ID:}
google.oauth.client-id=${GOOGLE_CLIENT_ID:}

# =====================
# Mail (optional)
# =====================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =====================
# Actuator / Health
# =====================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.health.redis.enabled=false
management.health.mail.enabled=false

# =====================
# Jackson
# =====================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# =====================
# Bean overriding
# =====================
spring.main.allow-bean-definition-overriding=true

# =====================
# Disable unused auto-configurations
# =====================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# =====================
# Alert Rules
# =====================
alert.rules.high-amount-threshold=1000
alert.rules.unusual-spending-multiplier=2.0
alert.rules.budget-warning-percentage=80
alert.rules.max-alerts-per-window=10
alert.rules.rate-limit-window-seconds=3600

# =====================
# ML Classifier
# =====================
ml-classifier.enabled=false
ml-classifier.url=http://localhost:5000

# =====================
# Internal Service URLs (monolith - all on same port)
# =====================
services.budgets.url=http://localhost:8080
services.transactions.url=http://localhost:8080