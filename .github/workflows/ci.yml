name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ── 1. Backend: compile + run all tests ─────────────────────────────────────
  backend-test:
    name: Backend Tests (Java 17)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn -f backend/monolith/pom.xml test

      - name: Upload Surefire report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: backend/monolith/target/surefire-reports/

  # ── 2. Frontend: type-check ──────────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend Type Check (Next.js 14)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web   # all steps run inside frontend/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ── 3. E2E smoke tests (Playwright) ─────────────────────────────────────────
  e2e:
    name: E2E Smoke Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [ backend-test, frontend-typecheck ]   # only run if both pass
    defaults:
      run:
        working-directory: frontend/web   # all steps run inside frontend/web

    env:
      BASE_URL:      ${{ secrets.E2E_BASE_URL || 'https://fintrack-liart.vercel.app' }}
      TEST_EMAIL:    ${{ secrets.E2E_TEST_EMAIL    }}
      TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests (Chromium only)
        run: npx playwright test --project=chromium
        continue-on-error: true   # don't fail CI if live site is slow

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/web/playwright-report/
          retention-days: 7
