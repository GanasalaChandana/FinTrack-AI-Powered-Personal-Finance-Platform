# ─── Test application configuration ─────────────────────────────────────────
# Uses H2 in-memory database — no Postgres, no Flyway, no Kafka, no Redis

# ── Datasource (H2 in-memory) ──────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:fintracktest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ── Disable Flyway (H2 schema created by Hibernate) ────────────────────────
spring.flyway.enabled=false

# ── Disable Kafka auto-configuration ────────────────────────────────────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ── JWT (test secret — not real) ────────────────────────────────────────────
jwt.secret=dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLXRlc3Rpbmc=
jwt.expiration=3600000

# ── Mail (noop for tests) ────────────────────────────────────────────────────
spring.mail.host=localhost
spring.mail.port=25
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ── Suppress startup noise ───────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.fintrack=INFO
logging.level.org.hibernate.SQL=WARN
